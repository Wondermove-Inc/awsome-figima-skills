name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write   # required for npm Trusted Publishing (OIDC) and MCP Registry

env:
  # Opt JS actions (e.g. softprops/action-gh-release) into Node 24 ahead of the
  # 2026-06-16 forced migration off the deprecated Node 20 runtime.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Extract version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          for GOOS in darwin linux windows; do
            for GOARCH in amd64 arm64; do
              BIN="figma-mcp-express"
              if [ "$GOOS" = "windows" ]; then BIN="figma-mcp-express.exe"; fi

              OUTDIR="npm/bin/${GOOS}-${GOARCH}"
              mkdir -p "$OUTDIR"

              GOOS=$GOOS GOARCH=$GOARCH go build \
                -ldflags "-X main.version=$VERSION" \
                -o "$OUTDIR/$BIN" \
                ./cmd/figma-mcp-express

              if [ "$GOOS" != "windows" ]; then chmod +x "$OUTDIR/$BIN"; fi
            done
          done

      - uses: oven-sh/setup-bun@v2

      - name: Build plugin
        working-directory: plugin
        run: bun install && bun run build

      - name: Package plugin
        run: zip -r plugin.zip plugin/manifest.json plugin/dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: plugin.zip
          generate_release_notes: true

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        working-directory: npm
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.x,
          # which silently can't do the OIDC token exchange and 404s on publish.
          npm install -g npm@latest
          npm --version
          cp ../README.md .
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          # Idempotent: re-running a tag (e.g. to fix a later step) must not 404 on an
          # already-published version — skip publish if this version is already on npm.
          if npm view "figma-mcp-express@$VERSION" version >/dev/null 2>&1; then
            echo "figma-mcp-express@$VERSION already on npm — skipping publish"
          else
            npm publish --access public --provenance
          fi

      - name: Set version in server.json
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
